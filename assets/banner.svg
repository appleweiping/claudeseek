<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 640" width="1600" height="640" font-family="'Segoe UI',-apple-system,Helvetica,Arial,sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#e8e3d6" stroke-width="1"/>
    </pattern>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97757"/>
      <stop offset="50%" stop-color="#d97757"/>
      <stop offset="50%" stop-color="#4d6bfe"/>
      <stop offset="100%" stop-color="#4d6bfe"/>
    </linearGradient>
    <marker id="ah" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 2L8 5L2 8" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1600" height="640" fill="#f6f4ee"/>
  <rect width="1600" height="640" fill="url(#grid)"/>
  <rect x="8" y="8" width="1584" height="624" rx="18" fill="none" stroke="#e0dccd" stroke-width="2"/>

  <!-- ===== left: wordmark + tagline ===== -->
  <g transform="translate(96,150)">
    <!-- two-tone fusion gem -->
    <g transform="translate(2,-86)">
      <path d="M30 0 L60 22 L48 58 L12 58 L0 22 Z" fill="url(#gem)" opacity="0.92"/>
      <path d="M30 0 L60 22 L48 58 L12 58 L0 22 Z" fill="none" stroke="#3a372f" stroke-width="2" stroke-linejoin="round"/>
      <path d="M30 0 L30 58 M0 22 L60 22" stroke="#3a372f" stroke-width="1.2" opacity="0.5"/>
    </g>

    <text x="0" y="40" font-size="104" font-weight="800" letter-spacing="-2">
      <tspan fill="#d97757">claude</tspan><tspan fill="#4d6bfe">seek</tspan>
    </text>
    <text x="4" y="92" font-size="30" font-weight="500" fill="#5f5b4d">Claude-grade agent architecture · DeepSeek V4 engine</text>

    <!-- feature pills -->
    <g transform="translate(4,128)" font-size="22" font-weight="600">
      <g>
        <rect x="0" y="0" width="150" height="44" rx="22" fill="#fff" stroke="#d97757" stroke-width="2"/>
        <text x="75" y="29" text-anchor="middle" fill="#c15f3c">Terminal CLI</text>
      </g>
      <g transform="translate(166,0)">
        <rect x="0" y="0" width="128" height="44" rx="22" fill="#fff" stroke="#4d6bfe" stroke-width="2"/>
        <text x="64" y="29" text-anchor="middle" fill="#3a55d8">Web UI</text>
      </g>
      <g transform="translate(310,0)">
        <rect x="0" y="0" width="190" height="44" rx="22" fill="#fff" stroke="#8c8775" stroke-width="2"/>
        <text x="95" y="29" text-anchor="middle" fill="#5f5b4d">multi-provider</text>
      </g>
    </g>

    <text x="4" y="214" font-size="21" font-weight="500" fill="#8c8775" letter-spacing="0.5">read · search · edit · run — permission-gated · zero deps</text>
  </g>

  <!-- whale (DeepSeek nod) bottom-left -->
  <g transform="translate(118,470)" stroke="#4d6bfe" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <path d="M0 26 C24 -6 96 -6 120 18 C130 8 142 6 150 8 C144 16 144 24 150 32 C120 56 36 58 8 40"/>
    <path d="M120 18 C112 30 96 34 80 32"/>
    <circle cx="28" cy="22" r="2.6" fill="#4d6bfe" stroke="none"/>
    <path d="M150 8 C158 2 168 2 176 6" opacity="0.6"/>
  </g>

  <!-- ===== right: terminal window ===== -->
  <g transform="translate(872,116)">
    <rect x="0" y="0" width="624" height="408" rx="16" fill="#1b1a17" stroke="#3a372f" stroke-width="1.5"/>
    <!-- title bar -->
    <path d="M0 16 a16 16 0 0 1 16 -16 h592 a16 16 0 0 1 16 16 v30 h-624 Z" fill="#23211d"/>
    <circle cx="26" cy="23" r="6" fill="#e05a5a"/>
    <circle cx="48" cy="23" r="6" fill="#deb860"/>
    <circle cx="70" cy="23" r="6" fill="#5eb67d"/>
    <text x="312" y="28" text-anchor="middle" font-size="17" fill="#9b968a" font-family="'Cascadia Code',Consolas,monospace">claudeseek — agent</text>

    <!-- terminal body -->
    <g font-family="'Cascadia Code',Consolas,monospace" font-size="18">
      <text x="24" y="86"><tspan fill="#d97757">❯</tspan><tspan fill="#ece9e2" dx="10">find the failing test and fix it</tspan></text>

      <text x="24" y="124" fill="#9b968a">✻ thinking… routing → v4-pro · max</text>

      <text x="24" y="162"><tspan fill="#4d6bfe">⏺ grep</tspan><tspan fill="#9b968a" dx="8">("expect\\(", **/*.test.js)</tspan></text>
      <text x="44" y="188" fill="#6f6b5f">⎿ 3 matches · 12ms</text>

      <text x="24" y="226"><tspan fill="#4d6bfe">⏺ read_file</tspan><tspan fill="#9b968a" dx="8">(sum.test.js)</tspan></text>
      <text x="44" y="252" fill="#6f6b5f">⎿ ok · 18 lines</text>

      <text x="24" y="290"><tspan fill="#4d6bfe">⏺ edit_file</tspan><tspan fill="#9b968a" dx="8">(sum.js)</tspan></text>
      <text x="44" y="316" fill="#5eb67d">⎿ ok · 1 replacement</text>

      <text x="24" y="354"><tspan fill="#ece9e2">All 14 tests pass. The bug was an</tspan></text>
      <text x="24" y="378"><tspan fill="#ece9e2">off-by-one in the loop bound.</tspan><tspan fill="#d97757" dx="6">▌</tspan></text>
    </g>
  </g>

  <!-- footer chip under terminal -->
  <g transform="translate(872,540)" font-family="'Cascadia Code',Consolas,monospace" font-size="16">
    <rect x="0" y="0" width="624" height="34" rx="10" fill="#efece3" stroke="#ddd9cd" stroke-width="1.5"/>
    <text x="16" y="23" fill="#6f6b5f">$0.0042 · 8.1k tok · cache 86% · deepseek-v4-pro · mode safe</text>
  </g>

  <!-- agent loop ring (top-right) -->
  <g transform="translate(1430,150)" font-size="14" font-weight="600">
    <circle cx="0" cy="0" r="56" fill="none" stroke="#cfc9b8" stroke-width="1.5" stroke-dasharray="3 5"/>
    <path d="M0 -56 A56 56 0 0 1 48 28" fill="none" stroke="#d97757" stroke-width="3" marker-end="url(#ah)"/>
    <path d="M48 28 A56 56 0 0 1 -48 28" fill="none" stroke="#4d6bfe" stroke-width="3" marker-end="url(#ah)"/>
    <text x="0" y="-2" text-anchor="middle" fill="#5f5b4d">agent</text>
    <text x="0" y="16" text-anchor="middle" fill="#8c8775" font-size="12">loop</text>
  </g>

  <!-- approval shield (mid-right float) -->
  <g transform="translate(820,470)">
    <path d="M24 0 L48 9 V30 C48 44 36 54 24 60 C12 54 0 44 0 30 V9 Z" fill="#fff" stroke="#5eb67d" stroke-width="2.4"/>
    <path d="M13 30 L21 39 L37 19" fill="none" stroke="#5eb67d" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
